<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Faculty | Beyond Limit Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

        /* ===== LIGHT MODE (default) ===== */
        :root,
        [data-theme="light"] {
            --bg-body: #f5f0ff;
            --text-main: #1e1140;
            --text-dim: #6d28d9;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(109, 40, 217, 0.3);
            --nav-bg: #ffffff;
            --card-hover: rgba(109, 40, 217, 0.08);
            --card-border: #c4b5fd;
            --input-bg: #ffffff;
            --input-border: #a78bfa;
            --nav-text: #4c1d95;
            --accent: #7c3aed;
            --card-body-bg: rgba(255,255,255,0.95);
            --teacher-card-overlay: #f5f0ff;
            --text-muted: #4b5563;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --toggle-bg: #e9d5ff;
            --toggle-icon-color: #7c3aed;
        }

        /* ===== DARK MODE ===== */
        [data-theme="dark"] {
            --bg-body: #0d0b1a;
            --text-main: #ede9fe;
            --text-dim: #a78bfa;
            --glass-bg: rgba(22, 17, 45, 0.92);
            --glass-border: rgba(139, 92, 246, 0.25);
            --nav-bg: #110d25;
            --card-hover: rgba(139, 92, 246, 0.12);
            --card-border: #4c1d95;
            --input-bg: #1a1535;
            --input-border: #6d28d9;
            --nav-text: #c4b5fd;
            --accent: #a78bfa;
            --card-body-bg: rgba(22,17,45,0.95);
            --teacher-card-overlay: #0a0518;
            --text-muted: #9ca3af;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --toggle-bg: #2d1f5e;
            --toggle-icon-color: #facc15;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            transition: background 0.4s ease, border-color 0.4s ease;
        }

        .purple-gradient {
            background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%);
        }

        .teacher-card {
            transition: var(--transition);
            border: 2px solid var(--card-border);
            background: var(--card-body-bg);
        }

        .teacher-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -15px rgba(109, 40, 217, 0.3);
            border-color: var(--accent);
        }

        .filter-btn {
            transition: var(--transition);
            background: var(--glass-bg);
            border: 1.5px solid var(--glass-border);
            color: var(--nav-text);
        }

        .filter-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        .nav-link {
            color: var(--nav-text);
            transition: var(--transition);
        }

        .nav-link:hover {
            background: var(--card-hover);
            color: var(--accent);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 10px; }

        /* ===== THEME TOGGLE BUTTON ===== */
        #theme-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--toggle-bg);
            color: var(--toggle-icon-color);
            border: none;
            border-radius: 999px;
            padding: 10px 14px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: var(--transition);
            width: 100%;
        }

        #theme-toggle:hover {
            filter: brightness(1.15);
            transform: scale(1.03);
        }

        #theme-toggle-icon { font-size: 16px; transition: transform 0.5s ease; }
        #theme-toggle:hover #theme-toggle-icon { transform: rotate(20deg); }

        /* Dark mode overrides for hardcoded Tailwind gray classes */
        [data-theme="dark"] .text-gray-600,
        [data-theme="dark"] .text-gray-500,
        [data-theme="dark"] .text-gray-400 {
            color: #a0aec0 !important;
        }

        /* Teacher card image gradient overlay adapts to dark mode via CSS var */
        .teacher-card-img-overlay {
            background: linear-gradient(to top, var(--teacher-card-overlay), transparent);
            opacity: 0.85;
        }
    </style>
</head>

<body class="min-h-screen pb-20">

    <!-- Navigation -->
    <nav
        class="fixed top-0 left-0 h-full w-20 md:w-64 glass border-r border-purple-500/10 z-50 flex flex-col p-4 transition-all duration-300">
        <div class="flex items-center gap-3 mb-12 px-2">
            <div
                class="w-10 h-10 purple-gradient rounded-xl flex items-center justify-center shadow-lg shadow-purple-500/30 shrink-0">
                <i class="fas fa-graduation-cap text-white text-xl"></i>
            </div>
            <span class="text-xl font-black tracking-tighter hidden md:block uppercase">Beyond<span
                    class="text-purple-600">Limit</span></span>
        </div>

        <div class="flex flex-col gap-2 w-full">
            <a href="index.html" class="nav-link flex items-center gap-4 px-4 py-3 rounded-xl">
                <i class="fas fa-home w-6 text-center"></i>
                <span class="hidden md:block font-semibold">Home</span>
            </a>
            <a href="index.html#packages" class="nav-link flex items-center gap-4 px-4 py-3 rounded-xl">
                <i class="fas fa-th-large w-6 text-center"></i>
                <span class="hidden md:block font-semibold">Packages</span>
            </a>
            <a href="About.html" class="nav-link flex items-center gap-4 px-4 py-3 rounded-xl">
                <i class="fas fa-info-circle w-6 text-center"></i>
                <span class="hidden md:block font-semibold">About Us</span>
            </a>
            <a href="Teachers.html" class="nav-link flex items-center gap-4 px-4 py-3 rounded-xl">
                <i class="fas fa-user-tie w-6 text-center"></i>
                <span class="hidden md:block font-semibold">Meet the Teachers</span>
            </a>
            <a href="index.html#inquiry" class="nav-link flex items-center gap-4 px-4 py-3 rounded-xl">
                <i class="fas fa-user-plus w-6 text-center"></i>
                <span class="hidden md:block font-semibold">Enroll Now</span>
            </a>
        </div>

        <div class="mt-auto pt-4">
            <button id="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">
                <span id="theme-toggle-icon">🌙</span>
                <span class="hidden md:inline" id="theme-toggle-label">Dark Mode</span>
            </button>
        </div>
    </nav>

    <main class="ml-20 md:ml-64 p-6 md:p-12 max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-16">
            <div
                class="inline-block px-4 py-1 rounded-full bg-purple-500/10 text-purple-700 text-xs font-black uppercase tracking-widest mb-4">
                Our Expert Educators
            </div>
            <h1 class="text-4xl md:text-7xl font-black uppercase mb-4 leading-none">Meet <span
                    class="text-purple-700">The Teachers </span></h1>
            <p class="text-gray-600 dark:text-gray-400 text-lg max-w-2xl italic border-l-4 border-purple-600 pl-4">"Our
                32+ educators are more than just teachers; they are
                mentors dedicated to pushing students beyond their perceived limits."</p>
        </header>

        <!-- Dynamic Filter Bar -->
        <div class="flex flex-wrap gap-4 mb-12" id="filter-bar">
            <button onclick="filterBy('all')"
                class="filter-btn active px-8 py-3 rounded-2xl text-xs font-black uppercase transition-all shadow-sm">All
                Teachers </button>
            <button onclick="filterBy('Science')"
                class="filter-btn px-8 py-3 rounded-2xl text-xs font-black uppercase transition-all shadow-sm">Science
                & Math</button>
            <button onclick="filterBy('Languages')"
                class="filter-btn px-8 py-3 rounded-2xl text-xs font-black uppercase transition-all shadow-sm">Languages</button>
            <button onclick="filterBy('Primary')"
                class="filter-btn px-8 py-3 rounded-2xl text-xs font-black uppercase transition-all shadow-sm">Primary
                (SK/SJKT)</button>
            <button onclick="filterBy('Secondary')"
                class="filter-btn px-8 py-3 rounded-2xl text-xs font-black uppercase transition-all shadow-sm">Secondary
                (SPM)</button>
        </div>

        <!-- Teachers Grid -->
        <div id="teachers-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <!-- JavaScript will inject 32 cards here -->
        </div>
    </main>

    <script>
        const faculty = [
            { name: "Teacher Amutha", subject: "Science", cat: "Science", img: "Teachers/Amutha.jpeg", desc: "Expert in Scientific Methods and Experiments" },
            { name: "Teacher Anisah", subject: "Science and Physics", cat: "Science", img: "Teachers/Anisah.jpeg", desc: "Expert in Basic Science Concept" },
            { name: "Cikgu Azizi", subject: "Bahasa Melayu", cat: "Languages", img: "Teachers/Azizi.jpeg", desc: "Karangan Specialist" },
            { name: "Teacher Dania", subject: "Science", cat: "Secondary", img: "Teachers/Dania.jpeg", desc: "Expert Educator" },
            { name: "Cikgu Faizal", subject: "Bahasa Melayu", cat: ["Languages", "Secondary"], img: "Teachers/Faizal.jpeg", desc: "Creative Learning" },
            { name: "Sir Farhan", subject: "English", cat: ["Languages", "Primary"], img: "Teachers/Farhan.jpeg", desc: "Creative and Inreactive Teaching" },
            { name: "Teacher Hanis", subject: "Science", cat: ["Primary", "Science"], img: "Teachers/Hanis.jpeg", desc: "Expert in Science Concepts" },
            { name: "Sir Hartono", subject: "Sejarah", cat: "Secondary", img: "Teachers/Hartono.jpeg", desc: "Exam Technique Expert" },
            { name: "Teacher Hasmiera", subject: "Chemistry", cat: ["Science", "Secondary"], img: "Teachers/Hasmiera.jpeg", desc: "Expert in Chemistry Concepts" },
            { name: "Teacher Hema", subject: "Mathematics", cat: ["Primary", "Science"], img: "Teachers/Hema.jpeg", desc: "Expert Educator" },
            { name: "Teacher Irsyada", subject: "Chemistry and Biology", cat: ["Science", "Secondary"], img: "Teachers/Irsyada.jpeg", desc: "Expert in Chemistry Experiment and Practical" },
            { name: "Teacher Jaya", subject: "Bahasa Melayu", cat: ["Primary", "Languages"], img: "Teachers/Jaya.jpeg", desc: "Interactive Learning" },
            { name: "Teacher Kalis", subject: "Mathematics", cat: ["Primary"], img: "Teachers/Kalis.jpeg", desc: "Expert Educator" },
            { name: "Teacher Kang", subject: "Sejarah", cat: "Primary", img: "Teachers/Kang.jpeg", desc: "Engaging and Story-Based Learning Approach" },
            { name: "Teacher Khushalyaa", subject: "Science", cat: ["Primary", "Science"], img: "Teachers/Khushalyaa.jpeg", desc: "Expert in Hands-On Learning" },
            { name: "Teacher Komala", subject: "Science and Sejarah", cat: "Primary", img: "Teachers/Komala.jpeg", desc: "Expert Educator" },
            { name: "Teacher Nandy", subject: "English", cat: "Primary", img: "Teachers/Nandy.jpeg", desc: "Clear Pronounciation and Grammar" },
            { name: "Teacher Nina", subject: "Physics", cat: "Secondary", img: "Teachers/Nina.jpeg", desc: "Practical and Experimental Physics" },
            { name: "Sir Ratnavell", subject: "Science", cat: ["Primary", "Science"], img: "Teachers/Ratnavell.jpeg", desc: "Expert Educator" },
            { name: "Sir Safwan", subject: "Mathematics and Add Maths", cat: "Secondary", img: "Teachers/Safwan.jpeg", desc: "Expert in Problem Solving" },
            { name: "Teacher Saidah", subject: "Bahasa Melayu and Pendidikan Islam", cat: "Languages", img: "Teachers/Saidah.jpeg", desc: "Expert in Islamic Studies" },
            { name: "Madam Sarina", subject: "Sejarah", cat: "Secondary", img: "Teachers/Sarina.jpeg", desc: "KBAT Focus" },
            { name: "Teacher Shalini", subject: "Basic Tamil", cat: "Languages", img: "Teachers/Shalini.jpeg", desc: "Experienced in teaching Tamil for beginners" },
            { name: "Sir Shathia", subject: "Mathematics", cat: ["Science", "Primary"], img: "Teachers/Shathia.jpeg", desc: "Expert in Question Analysis Skills" },
            { name: "Sir Shivabalan", subject: "Bahasa Tamil", cat: ["Primary", "Languages"], img: "Teachers/Shiva.jpeg", desc: "Skilled in teaching effective Tamil Writing" },
            { name: "Sir Tan", subject: "Science", cat: ["Primary", "Science"], img: "Teachers/Tan.jpeg", desc: "Expert in Science Concepts" },
            { name: "Sir Thava", subject: "Mathematics and Add Maths", cat: ["Primary", "Science"], img: "Teachers/Thava.jpeg", desc: "Expert in Accuracy and Calculation Skills" },
            { name: "Teacher Thenisha", subject: "Sejarah", cat: "Primary", img: "Teachers/Thenisha.jpeg", desc: "Expert in Answering Exam Questions Techniques" },
            { name: "Sir Ting", subject: "Mandarin", cat: ["Languages", "Primary"], img: "Teachers/Ting.jpeg", desc: "Expert in Teaching Mandarin Vocabulary" },
            { name: "Sir Vijay", subject: "Science and Biology", cat: ["Science", "Secondary"], img: "Teachers/Vijay.jpeg", desc: "Specialist in Experimental Skills" },
            { name: "Sir Vuzt", subject: "Maths", cat: "Primary", img: "Teachers/Vuzt.jpeg", desc: "Problem-Solving and Reasoning Skills" },
            { name: "Teacher Yoga", subject: "English", cat: "Secondary", img: "Teachers/Yuga.jpeg", desc: "Literature Expertise" }
        ];

        function renderFaculty(filter = 'all') {
            const grid = document.getElementById('teachers-grid');
            const data = filter === 'all' ? faculty : faculty.filter(t =>
                Array.isArray(t.cat) ? t.cat.includes(filter) : t.cat === filter
            );

            grid.innerHTML = data.map(t => `
                <div class="teacher-card rounded-[2.5rem] overflow-hidden flex flex-col group shadow-sm">
                    <div class="relative overflow-hidden aspect-[4/5]">
                        <img src="${t.img}" class="w-full h-full object-contain bg-purple-50 transition-transform duration-700 group-hover:scale-110" alt="${t.name}">
                        <div class="teacher-card-img-overlay absolute inset-0"></div>
                        <div class="absolute bottom-6 left-6">
                            <span class="bg-purple-700 text-white text-[9px] font-black px-3 py-1 rounded-md uppercase tracking-widest shadow-lg">${Array.isArray(t.cat) ? t.cat.join(' / ') : t.cat}</span>
                        </div>
                    </div>
                    <div class="p-8">
                        <p class="text-purple-600 font-black text-xs uppercase tracking-tighter mb-1" style="color: var(--accent);">${t.subject}</p>
                        <h3 class="text-xl font-black uppercase" style="color: var(--text-main);">${t.name}</h3>
                        <p class="text-xs mt-3 italic leading-relaxed font-semibold" style="color: var(--text-muted);">${t.desc}</p>
                    </div>
                </div>
            `).join('');
        }

        function filterBy(cat) {
            // Update buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(cat) || (cat === 'all' && btn.textContent.includes('All'))) {
                    btn.classList.add('active');
                }
            });
            renderFaculty(cat);
        }



        // ===== THEME MANAGEMENT =====
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('btl-theme', theme);
            const icon = document.getElementById('theme-toggle-icon');
            const label = document.getElementById('theme-toggle-label');
            if (theme === 'dark') {
                icon.textContent = '☀️';
                if (label) label.textContent = 'Light Mode';
            } else {
                icon.textContent = '🌙';
                if (label) label.textContent = 'Dark Mode';
            }
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            applyTheme(current === 'dark' ? 'light' : 'dark');
        }

        // Init Theme
        window.onload = () => {
            const saved = localStorage.getItem('btl-theme') || 'light';
            applyTheme(saved);
            renderFaculty();
        };
    </script>
</body>

</html>
